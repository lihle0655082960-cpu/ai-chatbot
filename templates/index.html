<!DOCTYPE html>
<html>

<head>
    <title>AI Career Assistant</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="chat-container">

    <div class="header">
        AI Career Assistant 🤖
    </div>

    <div id="chat-box"></div>

    <div class="input-area">
        <input
            type="text"
            id="user-input"
            placeholder="Ask me something..."
        >

        <button onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script>

async function sendMessage() {

    const input = document.getElementById("user-input");
    const message = input.value.trim();

    if (message === "") return;

    const chatBox = document.getElementById("chat-box");

    // Show user message
    chatBox.innerHTML += `
        <div class="message user-message">
            ${message}
        </div>
    `;

    // Clear input
    input.value = "";

    // Show typing message
    chatBox.innerHTML += `
        <div class="message bot-message" id="typing">
            Typing...
        </div>
    `;

    // Scroll to bottom
    chatBox.scrollTop = chatBox.scrollHeight;

    try {

        // Send message to Flask
        const response = await fetch("/get_response", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        // Wait 3 seconds so typing is visible
        setTimeout(() => {

            const typingElement =
                document.getElementById("typing");

            if (typingElement) {
                typingElement.remove();
            }

            // Show bot response
            chatBox.innerHTML += `
                <div class="message bot-message">
                    ${data.response}
                </div>
            `;

            chatBox.scrollTop = chatBox.scrollHeight;

        }, 3000);

    } catch (error) {

        const typingElement =
            document.getElementById("typing");

        if (typingElement) {
            typingElement.remove();
        }

        chatBox.innerHTML += `
            <div class="message bot-message">
                Error connecting to chatbot.
            </div>
        `;
    }
}

// Press Enter to send
document.getElementById("user-input")
.addEventListener("keypress", function(event) {

    if (event.key === "Enter") {
        sendMessage();
    }

});

</script>

</body>
</html>
